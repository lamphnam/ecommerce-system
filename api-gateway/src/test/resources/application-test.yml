spring:
  datasource:
    url: jdbc:h2:mem:gateway_db_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false

gateway:
  jwt:
    secret: test-secret-for-unit-tests-must-be-long-enough-32-chars
    expiration-seconds: 3600
