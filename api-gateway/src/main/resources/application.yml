spring:
  application:
    name: api-gateway

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5437/gateway_db}
    username: ${DB_USER:techlab}
    password: ${DB_PASS:techlab}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

# JWT validation + public paths.
# In production, override `gateway.jwt.secret` via env var and use a long random secret.
gateway:
  jwt:
    secret: ${JWT_SECRET:change-me-please-this-is-a-development-only-jwt-secret-32+chars}
    expiration-seconds: ${JWT_EXPIRATION_SECONDS:3600}
    clock-skew-seconds: 30
    user-id-claim: uid
    username-claim: sub
    role-claim: role
  public-paths:
    - /api/auth/
    - /v3/api-docs
    - /swagger-ui
    - /swagger-ui.html
    - /actuator/health
    - /actuator/info
  # Downstream service URLs. Defaults match the localhost dev ports so a plain
  # `mvnw spring-boot:run` per service works without env vars. Override these
  # in docker-compose / Kubernetes via the listed environment variables.
  services:
    order-url: ${ORDER_SERVICE_URL:http://localhost:8081}
    payment-url: ${PAYMENT_SERVICE_URL:http://localhost:8082}
    inventory-url: ${INVENTORY_SERVICE_URL:http://localhost:8083}
    notification-url: ${NOTIFICATION_SERVICE_URL:http://localhost:8084}
    analytics-url: ${ANALYTICS_SERVICE_URL:http://localhost:8085}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,gateway
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    org.springframework.cloud.gateway: INFO
    com.techlab.ecommerce.gateway: DEBUG
  pattern:
    level: "%5p [%X{requestId:-}]"
